# =============================================================
# Configuración de Clientes RADIUS - Controlador Omada
# =============================================================
# SEGURIDAD: Especificar IPs exactas de los controladores Omada
# Para múltiples controladores, crear un bloque client por cada uno
# =============================================================

# Cliente RADIUS primario (Controlador Omada)
client omada_controller_primary {
    ipaddr = 192.168.1.100
    secret = RadSecure@2026.prod.enterprise.freeradius
    require_message_authenticator = yes
    proto = udp
}

