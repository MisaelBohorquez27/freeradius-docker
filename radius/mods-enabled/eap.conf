# =============================================================\n# CONFIGURACIÓN EAP-PEAP\n# Fase 3: WPA2-Enterprise WiFi Authentication\n# =============================================================\n# ⚠️ IMPORTANTE: Cambiar valores de certificados y configuración\n# =============================================================\n\neap {\n    # ==========================================================\n    # TIPO DE EAP\n    # ==========================================================\n    \n    # Métodos EAP permitidos (orden de preferencia)\n    # default_eap_type = peap\n    \n    # Timer de EAP (segundos)\n    timer_expire = 60\n    \n    # Repeticiones de solicitud\n    max_retransmissions = 5\n    \n    # ==========================================================\n    # CONFIGURACIÓN PEAP (Protected EAP)\n    # ==========================================================\n    # Recomendado para WiFi WPA2-Enterprise\n    \n    peap {\n        # Versión de PEAP (0 = auto, 1 = v1, 2 = v2)\n        tls_version = \"1.2\"\n        \n        # 🔧 CAMBIAR: Certificado del servidor PEAP\n        # Debe ser autofirmado o de CA confiable\n        # Formato: /ruta/al/certificado.crt\n        # ⚠️ Generado: 2026-04-28\n        # TODO: Reemplazar con certificado real o regenerar anualmente\n        tls_cert_file = \"/etc/freeradius/3.0/certs/server.crt\"\n        \n        # 🔧 CAMBIAR: Clave privada del servidor\n        # ⚠️ CRÍTICO: Mantener seguro, nunca compartir\n        # TODO: Proteger con permisos restrictivos (600)\n        tls_key_file = \"/etc/freeradius/3.0/certs/server.key\"\n        \n        # 🔧 CAMBIAR: Certificado de CA\n        # Para validar cliente (si se requiere)\n        # tls_ca_file = \"/etc/freeradius/3.0/certs/ca.crt\"\n        \n        # Métodos inner (dentro de PEAP)\n        # Típicamente MSCHAPV2 para compatibilidad Windows\n        default_method = mschapv2\n        \n        # Ciclo de vida de sesión TLS (segundos)\n        session_lifetime = 3600\n        \n        # Permitir reutilización de sesión\n        session_resumption = yes\n    }\n    \n    # ==========================================================\n    # CONFIGURACIÓN TLS\n    # ==========================================================\n    \n    tls {\n        # Versión TLS mínima (recomendado: 1.2)\n        tls_version = \"1.2\"\n        \n        # Ciphersuites permitidas (fuerte)\n        # Descomentar para restringir\n        # tls_ciphers = \"ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-GCM-SHA256\"\n        \n        # Validar nombre del servidor (certificado)\n        verify_cert_cn = no\n        \n        # Requerir validación de cliente\n        require_client_cert = no\n        \n        # Ruta para caché de sesiones\n        # session_cache_server = \"/var/lib/freeradius/tls_sessions\"\n    }\n    \n    # ==========================================================\n    # MÉTODOS DE AUTENTICACIÓN INNER (dentro de EAP)\n    # ==========================================================\n    \n    # MSCHAPv2 (compatible con Windows/MacOS)\n    mschapv2 {\n        # Autenticación con LDAP/AD\n        # Configurar en ldap.conf\n        \n        # Cambiar contraseña permitido\n        with_ntdomain_hack = yes\n    }\n    \n    # GTC (Generic Token Card) - para tokens\n    # gtc {\n    #     challenge = \"Password: \"\n    #     auth_type = \"LDAP\"  # Usar LDAP para verificar\n    # }\n    \n    # ==========================================================\n    # SEGURIDAD\n    # ==========================================================\n    \n    # Fase rápida permitida (renegociación)\n    fast {\n        # Descomentar si se requiere soporte FAST\n        # fast_PAC_request = yes\n    }\n    \n    # ==========================================================\n    # DEBUGGING (comentar en producción)\n    # ==========================================================\n    \n    # tls_log_all = no\n    # tls_log_severe = no\n}\n\n# =============================================================\n# CONFIGURACIÓN DE CERTIFICADOS PARA FASE 3\n# =============================================================\n# \n# Los certificados se generaron en Fase 1\n# Para WPA2-Enterprise completo, se recomienda:\n#\n# 1. CA (Autoridad Certificadora)\n#    - Archivo: certs/ca.crt\n#    - Usar: en cliente WiFi (confiar en CA)\n#\n# 2. Certificado del Servidor PEAP\n#    - Archivo: certs/server.crt\n#    - Debe coincidir con nombre del servidor\n#\n# 3. Clave Privada del Servidor\n#    - Archivo: certs/server.key\n#    - ⚠️ CRÍTICO: Nunca compartir\n#\n# =============================================================\n# PARA PRODUCCIÓN\n# =============================================================\n# \n# En lugar de certificados autofirmados:\n# \n# 1. Obtener certificado de CA confiable (Let's Encrypt, etc)\n# 2. Especificar rutas en tls_cert_file y tls_key_file\n# 3. Validar que nombre del servidor coincida con CN del certificado\n# 4. Habilitar verify_cert_cn = yes\n# 5. Distribuir ca.crt a clientes WiFi\n#\n# =============================================================\n"