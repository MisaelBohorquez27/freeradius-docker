# =============================================================
# MÓDULO LDAP - Integración con Active Directory
# Fase 2: Autenticación contra Microsoft Active Directory
# =============================================================
# ⚠️ IMPORTANTE: Cambiar valores de configuración a tu entorno
# =============================================================

ldap {
    # ==========================================================
    # CONEXIÓN AL SERVIDOR LDAP/ACTIVE DIRECTORY
    # ==========================================================
    
    # 🔧 CAMBIAR: Servidor LDAP/Active Directory
    # Ejemplos:
    #   - dc01.example.com
    #   - ldap.example.com  
    #   - 192.168.1.50
    server = "dc01.example.local"
    
    # 🔧 CAMBIAR: Puerto LDAP
    # 389  = LDAP estándar (sin encriptación)
    # 636  = LDAPS (con SSL/TLS - recomendado)
    port = 389
    
    # Puerto LDAPS (descomentar si usas 636)
    # port = 636
    
    # Usar TLS para conexión segura
    use_tls = no
    # use_tls = yes  # Descomentar para LDAPS
    
    # Archivo CA para validar certificado del servidor LDAP
    # tls_ca_file = "/etc/freeradius/3.0/certs/ad-ca.crt"
    
    # Requerir validación de certificado (si usas TLS)
    # tls_require_cert = "demand"
    
    # ==========================================================
    # CREDENCIALES DE ACCESO AL DIRECTORIO
    # ==========================================================
    
    # 🔧 CAMBIAR: Usuario de servicio para queries LDAP
    # Formato: usuario@dominio.com o CN=usuario,OU=...,DC=...
    # Contraseña aleatoria (cambiar a tu contraseña real)
    # Generada: 2026-04-28
    bind_dn = "CN=radius_service,OU=ServiceAccounts,DC=example,DC=local"
    bind_password = "K7xZ9mP2wN5qR8tL3vQ6bY1jF4sH0nM9"  # ⚠️ CAMBIAR
    
    # Usa autenticación simple (no SASL)
    use_sasl = no
    
    # ==========================================================
    # BÚSQUEDA DE USUARIOS EN EL DIRECTORIO
    # ==========================================================
    
    # 🔧 CAMBIAR: Base DN (punto de inicio de búsqueda)
    # Ejemplos:
    #   - DC=example,DC=com
    #   - OU=Users,DC=example,DC=com
    base_dn = "OU=Users,DC=example,DC=local"
    
    # Filtro de búsqueda de usuarios
    # %u = nombre de usuario ingresado
    # Buscar por sAMAccountName (usuario de AD)
    filter = "(&(objectClass=user)(sAMAccountName=%u)(!(userAccountControl:1.2.840.113556.1.4.803:=2))))"
    
    # Alcance de búsqueda
    # BASE, ONE, SUB (por defecto)
    scope = "sub"
    
    # ==========================================================
    # ATRIBUTOS DE USUARIO A OBTENER
    # ==========================================================
    
    update {
        # Contraseña desde AD (si es compatible)
        control:Password-With-Header := 'userPassword'
        
        # Otros atributos útiles
        request:Calling-Station-Id := 'ipAddress'
        request:Framed-IPv4-Address := 'homeDirectory'
    }
    
    # ==========================================================
    # SINCRONIZACIÓN DE GRUPOS
    # ==========================================================
    
    # Descomentar para usar grupos de seguridad de AD
    # group_da = "OU=Groups,DC=example,DC=local"
    # group_filter = "(&(objectClass=group)(cn=%g))"
    # group_membership_filter = "(&(objectClass=user)(sAMAccountName=%u)(memberOf=%D))"
    
    # ==========================================================
    # OPCIONES DE TIMEOUT Y REINTENTOS
    # ==========================================================
    
    # Timeout para respuesta LDAP
    timeout = 10
    
    # Esperar entre reintentos
    retry_delay = 1
    
    # Reintentos de conexión
    timelimit = 10
    
    # Rebind en reintentos
    rebind = yes
    
    # ==========================================================
    # POOL DE CONEXIONES LDAP
    # ==========================================================
    
    pool {
        # Conexiones iniciales
        start = 5
        
        # Mínimo de conexiones activas
        min = 3
        
        # Máximo de conexiones
        max = 10
        
        # Conexiones de repuesto
        spare = 3
        
        # 0 = usar siempre, >0 = máximo de usos por conexión
        uses = 0
        
        # Tiempo máximo de vida de conexión (segundos)
        lifetime = 3600
        
        # Intervalo de limpieza de conexiones inactivas
        cleanup_interval = 300
    }
    
    # ==========================================================
    # CONFIGURACIÓN DE CERTIFICADOS TLS (si usas LDAPS)
    # ==========================================================
    
    # tls {
    #     # Certificado de CA del servidor LDAP
    #     ca_file = "/etc/freeradius/3.0/certs/ad-ca.crt"
    #     
    #     # Certificado del cliente (si es requerido)
    #     certfile = "/etc/freeradius/3.0/certs/client.crt"
    #     
    #     # Clave privada del cliente
    #     keyfile = "/etc/freeradius/3.0/certs/client.key"
    #     
    #     # Requerir validación: hard, soft, allow, deny
    #     require_cert = "hard"
    # }
    
    # ==========================================================
    # CONFIGURACIÓN EXPERIMENTAL
    # ==========================================================
    
    # Mapeo de atributos personalizados
    # update request {
    #     Tunnel-Private-Group-ID := "memberOf"
    # }
    
    # ==========================================================
    # PARÁMETROS DE DEBUGGING
    # ==========================================================
    
    # Mostrar queries LDAP en logs (comentar en producción)
    # edir_account_policy_check = no
}

