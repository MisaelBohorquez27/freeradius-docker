# =============================================================\n# ALERTMANAGER - CONFIGURACIÓN DE ALERTAS\n# Fase 4: Notificaciones\n# =============================================================\n# ⚠️ IMPORTANTE: Cambiar email, Slack webhook, etc\n# =============================================================\n\nglobal:\n  resolve_timeout: 5m\n  # Email SMTP (para enviar notificaciones)\n  # ⚠️ CAMBIAR A TUS VALORES\n  smtp_smarthost: 'smtp.gmail.com:587'  # ⚠️ CAMBIAR\n  smtp_auth_username: 'alertas@empresa.local'  # ⚠️ CAMBIAR\n  smtp_auth_password: 'P8x9nL2qR3jF5bM1kW4v'  # ⚠️ CAMBIAR - usar app password\n  smtp_from: 'freeradius-alerts@empresa.local'  # ⚠️ CAMBIAR\n\n# =============================================================\n# PLANTILLAS\n# =============================================================\ntemplates:\n  - '/etc/alertmanager/templates/*.tmpl'\n\n# =============================================================\n# ÁRBOL DE RUTAS DE ALERTAS\n# =============================================================\nroute:\n  # Receptor por defecto\n  receiver: 'default-receiver'\n  \n  # Agrupar alertas por:\n  group_by: ['alertname', 'cluster', 'service']\n  \n  # Esperar antes de enviar alerta (deduplicación)\n  group_wait: 10s\n  \n  # Esperar antes de enviar más actualizaciones\n  group_interval: 10s\n  \n  # Esperar antes de re-enviar\n  repeat_interval: 4h\n  \n  # Sub-rutas\n  routes:\n    # ALERTAS CRÍTICAS - Email INMEDIATO\n    - match:\n        severity: critical\n      receiver: 'critical-alerts'\n      group_wait: 0s  # Sin espera\n      group_interval: 1m\n      repeat_interval: 1h\n    \n    # ALERTAS DE ADVERTENCIA - Email diario\n    - match:\n        severity: warning\n      receiver: 'warning-alerts'\n      group_wait: 30s\n      repeat_interval: 24h\n    \n    # ALERTAS DE COMPONENTE FREERADIUS\n    - match:\n        component: freeradius\n      receiver: 'freeradius-team'\n      group_wait: 10s\n      group_interval: 5m\n\n# =============================================================\n# RECEPTORES (Destinos de notificación)\n# =============================================================\nreceivers:\n  # Receptor por defecto (webhook/email)\n  - name: 'default-receiver'\n    email_configs:\n      - to: 'admin@empresa.local'  # ⚠️ CAMBIAR\n        from: 'freeradius-alerts@empresa.local'\n        smarthost: 'smtp.gmail.com:587'\n        auth_username: 'alertas@empresa.local'  # ⚠️ CAMBIAR\n        auth_password: 'P8x9nL2qR3jF5bM1kW4v'  # ⚠️ CAMBIAR\n        headers:\n          Subject: '[ALERTA] {{ .GroupLabels.alertname }}'\n        html: |\n          <h3>{{ .GroupLabels.alertname }}</h3>\n          {{ range .Alerts }}\n            <p><strong>{{ .Labels.severity }}</strong>: {{ .Annotations.description }}</p>\n          {{ end }}\n\n  # Alertas CRÍTICAS - Escalada inmediata\n  - name: 'critical-alerts'\n    email_configs:\n      - to: 'sysadmin@empresa.local,oncall@empresa.local'  # ⚠️ CAMBIAR\n        from: 'freeradius-alerts@empresa.local'\n        smarthost: 'smtp.gmail.com:587'\n        auth_username: 'alertas@empresa.local'  # ⚠️ CAMBIAR\n        auth_password: 'P8x9nL2qR3jF5bM1kW4v'  # ⚠️ CAMBIAR\n        headers:\n          Subject: '[🔴 CRÍTICO] {{ .GroupLabels.alertname }}'\n    \n    # Slack (opcional - descomentar si tienes webhook)\n    # slack_configs:\n    #   - api_url: 'https://hooks.slack.com/services/YOUR/WEBHOOK/URL'  # ⚠️ CAMBIAR\n    #     channel: '#alerts-critical'\n    #     title: '🔴 ALERTA CRÍTICA: {{ .GroupLabels.alertname }}'\n    #     text: '{{ range .Alerts }}{{ .Annotations.description }}\\n{{ end }}'\n\n  # Alertas WARNING - Notificación moderada\n  - name: 'warning-alerts'\n    email_configs:\n      - to: 'sysadmin@empresa.local'  # ⚠️ CAMBIAR\n        from: 'freeradius-alerts@empresa.local'\n        smarthost: 'smtp.gmail.com:587'\n        auth_username: 'alertas@empresa.local'  # ⚠️ CAMBIAR\n        auth_password: 'P8x9nL2qR3jF5bM1kW4v'  # ⚠️ CAMBIAR\n        headers:\n          Subject: '[⚠️  ADVERTENCIA] {{ .GroupLabels.alertname }}'\n\n  # Equipo FreeRADIUS\n  - name: 'freeradius-team'\n    email_configs:\n      - to: 'network-team@empresa.local'  # ⚠️ CAMBIAR\n        from: 'freeradius-alerts@empresa.local'\n        smarthost: 'smtp.gmail.com:587'\n        auth_username: 'alertas@empresa.local'  # ⚠️ CAMBIAR\n        auth_password: 'P8x9nL2qR3jF5bM1kW4v'  # ⚠️ CAMBIAR\n        headers:\n          Subject: '[FreeRADIUS] {{ .GroupLabels.alertname }}'\n\n# =============================================================\n# INHIBICIÓN DE ALERTAS\n# =============================================================\n# (Evitar alertas duplicadas)\ninhibit_rules:\n  # No alertar de WARNING si hay CRITICAL\n  - source_match:\n      severity: 'critical'\n    target_match:\n      severity: 'warning'\n    equal: ['alertname', 'dev', 'instance']\n\n# =============================================================\n# NOTAS IMPORTANTES\n# =============================================================\n#\n# 1. SMTP:\n#    - Gmail: Usar \"App Password\" (no contraseña normal)\n#    - Office 365: smtp.office365.com:587\n#    - Propio servidor: configurar host y puerto\n#\n# 2. SLACK WEBHOOK:\n#    - Crear en: https://api.slack.com/apps\n#    - Obtener URL: https://hooks.slack.com/services/...\n#    - Pegar en slack_configs.api_url\n#\n# 3. CAMBIAR TODOS LOS VALORES MARCADOS CON ⚠️:\n#    - Emails\n#    - Contraseña/token\n#    - SMTP server\n#\n# 4. PROBAR ALERTAS:\n#    docker exec alertmanager-freeradius \\\n#      amtool alert add test_alert severity=critical\n#\n# 5. RUTAS:\n#    - Las alertas se envían según severidad\n#    - Critical → oncall + sysadmin\n#    - Warning → sysadmin\n#    - FreeRADIUS → network-team\n#\n"