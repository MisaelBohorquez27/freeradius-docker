# =============================================================\n# REGLAS DE ALERTAS PARA FREERADIUS\n# Fase 4: Monitoreo y Alertas\n# =============================================================\n\ngroups:\n  - name: freeradius_alerts\n    interval: 30s\n    rules:\n\n      # =======================================================\n      # ALERTAS DE DISPONIBILIDAD\n      # =======================================================\n      \n      - alert: FreeRADIUSDown\n        expr: up{job=~\"freeradius-primary|freeradius-secondary\"} == 0\n        for: 1m\n        labels:\n          severity: critical\n          component: freeradius\n        annotations:\n          summary: \"FreeRADIUS {{ $labels.instance }} está OFFLINE\"\n          description: \"FreeRADIUS ({{ $labels.instance }}) no responde por más de 1 minuto\"\n          action: \"Verificar: docker ps | grep freeradius-{{ $labels.instance }}\"\n\n      - alert: FreeRADIUSRestarts\n        expr: increase(container_last_seen{name=~\"freeradius-.*\"}[5m]) > 0\n        labels:\n          severity: warning\n          component: freeradius\n        annotations:\n          summary: \"FreeRADIUS {{ $labels.name }} se está reiniciando\"\n          description: \"El contenedor se ha reiniciado múltiples veces en los últimos 5 minutos\"\n          action: \"Ver logs: docker logs {{ $labels.name }}\"\n\n      # =======================================================\n      # ALERTAS DE RECURSOS\n      # =======================================================\n      \n      - alert: FreeRADIUSCPUHigh\n        expr: |\n          rate(container_cpu_usage_seconds_total{name=~\"freeradius-.*\"}[5m]) * 100 > 80\n        for: 5m\n        labels:\n          severity: warning\n          component: freeradius\n          resource: cpu\n        annotations:\n          summary: \"CPU alta en FreeRADIUS {{ $labels.name }}\"\n          description: \"Uso de CPU > 80% durante 5 minutos\"\n          value: \"{{ $value | humanize }}%\"\n          action: \"Revisar carga: docker stats {{ $labels.name }}\"\n\n      - alert: FreeRADIUSMemoryHigh\n        expr: |\n          (container_memory_usage_bytes{name=~\"freeradius-.*\"} / container_memory_max_bytes{name=~\"freeradius-.*\"}) * 100 > 85\n        for: 5m\n        labels:\n          severity: warning\n          component: freeradius\n          resource: memory\n        annotations:\n          summary: \"Memoria alta en FreeRADIUS {{ $labels.name }}\"\n          description: \"Uso de memoria > 85% durante 5 minutos\"\n          value: \"{{ $value | humanize }}%\"\n          action: \"Revisar procesos: docker top {{ $labels.name }}\"\n\n      - alert: FreeRADIUSMemoryCritical\n        expr: |\n          (container_memory_usage_bytes{name=~\"freeradius-.*\"} / container_memory_max_bytes{name=~\"freeradius-.*\"}) * 100 > 95\n        for: 2m\n        labels:\n          severity: critical\n          component: freeradius\n          resource: memory\n        annotations:\n          summary: \"MEMORIA CRÍTICA en FreeRADIUS {{ $labels.name }}\"\n          description: \"Uso de memoria > 95%. Riesgo de crash inminente\"\n          value: \"{{ $value | humanize }}%\"\n          action: \"AUMENTAR memoria en docker-compose o REINICIAR contenedor\"\n\n      # =======================================================\n      # ALERTAS DE AUTENTICACIÓN\n      # =======================================================\n      \n      - alert: FreeRADIUSHighAuthFailures\n        expr: |\n          rate(freeradius_auth_reject_total[5m]) > 0.5\n        for: 5m\n        labels:\n          severity: warning\n          component: freeradius\n          type: authentication\n        annotations:\n          summary: \"Tasa alta de rechazos de autenticación\"\n          description: \"FreeRADIUS rechaza > 50% de intentos de autenticación\"\n          value: \"{{ $value | humanize }}/s\"\n          action: \"Verificar credenciales AD, logs: docker logs freeradius-primary\"\n\n      - alert: FreeRADIUSNoAuthAttempts\n        expr: |\n          increase(freeradius_auth_accept_total[30m]) == 0\n        for: 30m\n        labels:\n          severity: warning\n          component: freeradius\n          type: authentication\n        annotations:\n          summary: \"Sin intentos de autenticación en 30 minutos\"\n          description: \"No se detectan intentos de autenticación. Verificar conectividad con Omada\"\n          action: \"Verificar cliente RADIUS en Omada, verificar secret coincida\"\n\n      # =======================================================\n      # ALERTAS DE RED\n      # =======================================================\n      \n      - alert: FreeRADIUSPortNotListening\n        expr: |\n          absent(freeradius_port_listening{port=\"1812\"}) == 1\n        for: 1m\n        labels:\n          severity: critical\n          component: freeradius\n          type: network\n        annotations:\n          summary: \"FreeRADIUS NO escucha en puerto 1812\"\n          description: \"RADIUS no está disponible para autenticación\"\n          action: \"Reiniciar contenedor: docker restart freeradius-primary\"\n\n      # =======================================================\n      # ALERTAS DE ALMACENAMIENTO\n      # =======================================================\n      \n      - alert: DiskSpaceLow\n        expr: |\n          (node_filesystem_avail_bytes{mountpoint=\"/\"} / node_filesystem_size_bytes{mountpoint=\"/\"}) * 100 < 10\n        for: 5m\n        labels:\n          severity: warning\n          component: system\n          resource: disk\n        annotations:\n          summary: \"Espacio en disco bajo\"\n          description: \"Espacio disponible < 10%\"\n          value: \"{{ $value | humanize }}%\"\n          action: \"Limpiar logs antiguos o expandir volumen\"\n\n      # =======================================================\n      # ALERTAS DE LOGS\n      # =======================================================\n      \n      - alert: FreeRADIUSLogErrors\n        expr: |\n          increase(freeradius_log_errors_total[5m]) > 5\n        for: 5m\n        labels:\n          severity: warning\n          component: freeradius\n          type: logs\n        annotations:\n          summary: \"Errores en logs de FreeRADIUS\"\n          description: \"Se detectaron > 5 errores en últimos 5 minutos\"\n          count: \"{{ $value }}\"\n          action: \"Revisar logs: docker logs -f freeradius-primary\"\n\n      # =======================================================\n      # ALERTAS DE HA/CLUSTERING\n      # =======================================================\n      \n      - alert: FreeRADIUSSecondaryDown\n        expr: up{job=\"freeradius-secondary\"} == 0\n        for: 2m\n        labels:\n          severity: critical\n          component: freeradius\n          ha_status: redundancy_lost\n        annotations:\n          summary: \"FreeRADIUS SECUNDARIO está OFFLINE - SIN REDUNDANCIA\"\n          description: \"El servidor secundario no está disponible. La infraestructura NO tiene redundancia.\"\n          action: \"URGENTE: Restaurar servidor secundario: docker restart freeradius-secondary\"\n\n# =============================================================\n# NOTAS DE CONFIGURACIÓN\n# =============================================================\n#\n# 1. Severidades:\n#    - critical: Acción inmediata requerida\n#    - warning: Investigar pronto\n#    - info: Información útil\n#\n# 2. Umbral de alertas:\n#    - CPU: > 80% por 5 min\n#    - Memoria: > 85% warning, > 95% critical\n#    - Auth failures: > 50% por 5 min\n#    - Disk: < 10% disponible\n#\n# 3. Para cambiar umbrales, editar valores en 'expr:'\n#    Ejemplo: CPU > 80 → cambiar a > 70 (o el valor deseado)\n#\n# 4. Integrar con notificaciones (email, Slack, etc)\n#    Ver: ./alertmanager.yml\n#\n"