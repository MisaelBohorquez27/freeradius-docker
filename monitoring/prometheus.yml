# =============================================================\n# CONFIGURACIÓN DE PROMETHEUS\n# Fase 4: Monitoreo y Alertas\n# =============================================================\n\nglobal:\n  scrape_interval: 15s\n  evaluation_interval: 15s\n  external_labels:\n    monitor: 'freeradius-monitor'\n    environment: 'production'  # ⚠️ CAMBIAR a 'staging', 'production', etc\n\n# =============================================================\n# ALERTMANAGER\n# =============================================================\nalerting:\n  alertmanagers:\n    - static_configs:\n        - targets:\n            - alertmanager:9093\n\n# =============================================================\n# REGLAS DE ALERTAS\n# =============================================================\nrule_files:\n  - '/etc/prometheus/rules/*.yml'\n\n# =============================================================\n# TARGETS (Scrape configs)\n# =============================================================\nscrape_configs:\n  # Prometheus propio\n  - job_name: 'prometheus'\n    static_configs:\n      - targets: ['localhost:9090']\n\n  # FreeRADIUS Primary\n  - job_name: 'freeradius-primary'\n    metrics_path: '/metrics'\n    static_configs:\n      - targets: ['freeradius-primary:18120']  # Puerto de métricas\n        labels:\n          instance: 'primary'\n          environment: 'production'\n\n  # FreeRADIUS Secondary\n  - job_name: 'freeradius-secondary'\n    metrics_path: '/metrics'\n    static_configs:\n      - targets: ['freeradius-secondary:18120']  # Puerto de métricas\n        labels:\n          instance: 'secondary'\n          environment: 'production'\n\n  # Docker stats\n  - job_name: 'docker'\n    static_configs:\n      - targets: ['localhost:9323']\n\n  # Node exporter (si está instalado)\n  # - job_name: 'node'\n  #   static_configs:\n  #     - targets: ['node-exporter:9100']\n\n  # Alertmanager\n  - job_name: 'alertmanager'\n    static_configs:\n      - targets: ['alertmanager:9093']\n\n# =============================================================\n# NOTAS IMPORTANTES\n# =============================================================\n#\n# 1. FreeRADIUS necesita exportar métricas\n#    Ver: ./monitoring/freeradius-exporter.conf\n#\n# 2. Puertos de métricas:\n#    - Prometheus: 9090\n#    - Grafana: 3000\n#    - Alertmanager: 9093\n#    - FreeRADIUS exporter: 18120 (personalizado)\n#\n# 3. Reglas de alertas en: ./monitoring/rules/\n#    - cpu_alerts.yml\n#    - memory_alerts.yml\n#    - freeradius_alerts.yml\n#\n# 4. Cambiar 'environment' a tu valor real\n#\n"