version: '3.8' # =============================================================\n# FASE 4: PRODUCCIÓN - ALTA DISPONIBILIDAD\n# =============================================================\n# Docker Compose para FreeRADIUS con redundancia y monitoreo\n# ⚠️ IMPORTANTE: Cambiar credenciales y IPs a valores reales\n# =============================================================\n\nservices:\n  # ==========================================================\n  # FREERADIUS PRIMARIO\n  # ==========================================================\n  freeradius-primary:\n    build: .\n    container_name: freeradius-primary\n    \n    # Red y hostname\n    networks:\n      freeradius-network:\n        ipv4_address: 172.28.1.10\n        aliases:\n          - radius-1.local\n    \n    # Volúmenes\n    volumes:\n      - ./radius:/etc/freeradius/3.0:ro\n      - ./logs/primary:/var/log/freeradius\n      - ./certs:/etc/freeradius/3.0/certs:ro\n      - ./backups:/var/backups/freeradius\n    \n    # Puertos (primario)\n    ports:\n      - \"1812:1812/udp\"  # RADIUS Auth\n      - \"1813:1813/udp\"  # RADIUS Accounting\n    \n    # Variables de entorno\n    environment:\n      - FREERADIUS_LOG_LEVEL=info\n      - FREERADIUS_INSTANCE=primary\n      - FREERADIUS_SECRET=W4nP7kL2xM9qR5tV3b8jF0nZ2hC6mR1p  # ⚠️ CAMBIAR\n    \n    # Reinicio automático\n    restart: always\n    \n    # Logging\n    logging:\n      driver: \"json-file\"\n      options:\n        max-size: \"50m\"\n        max-file: \"10\"\n        labels: \"service=freeradius,instance=primary\"\n    \n    # Healthcheck\n    healthcheck:\n      test: [\"CMD\", \"sh\", \"-c\", \"netstat -uln | grep 1812\"]\n      interval: 30s\n      timeout: 10s\n      retries: 3\n      start_period: 10s\n    \n    # Limites de recursos\n    deploy:\n      resources:\n        limits:\n          cpus: '1.0'\n          memory: 512M\n        reservations:\n          cpus: '0.5'\n          memory: 256M\n    \n    # Security\n    security_opt:\n      - no-new-privileges:true\n    read_only_root_filesystem: false\n\n  # ==========================================================\n  # FREERADIUS SECUNDARIO (para HA)\n  # ==========================================================\n  freeradius-secondary:\n    build: .\n    container_name: freeradius-secondary\n    \n    # Red\n    networks:\n      freeradius-network:\n        ipv4_address: 172.28.1.11\n        aliases:\n          - radius-2.local\n    \n    # Volúmenes (mismos que primario)\n    volumes:\n      - ./radius:/etc/freeradius/3.0:ro\n      - ./logs/secondary:/var/log/freeradius\n      - ./certs:/etc/freeradius/3.0/certs:ro\n      - ./backups:/var/backups/freeradius\n    \n    # Puertos (diferentes al primario)\n    ports:\n      - \"1814:1812/udp\"  # RADIUS Auth (mapeo diferente)\n      - \"1815:1813/udp\"  # RADIUS Accounting\n    \n    # Variables de entorno\n    environment:\n      - FREERADIUS_LOG_LEVEL=info\n      - FREERADIUS_INSTANCE=secondary\n      - FREERADIUS_SECRET=W4nP7kL2xM9qR5tV3b8jF0nZ2hC6mR1p  # ⚠️ CAMBIAR\n    \n    restart: always\n    \n    logging:\n      driver: \"json-file\"\n      options:\n        max-size: \"50m\"\n        max-file: \"10\"\n        labels: \"service=freeradius,instance=secondary\"\n    \n    healthcheck:\n      test: [\"CMD\", \"sh\", \"-c\", \"netstat -uln | grep 1812\"]\n      interval: 30s\n      timeout: 10s\n      retries: 3\n      start_period: 10s\n    \n    deploy:\n      resources:\n        limits:\n          cpus: '1.0'\n          memory: 512M\n        reservations:\n          cpus: '0.5'\n          memory: 256M\n    \n    security_opt:\n      - no-new-privileges:true\n\n  # ==========================================================\n  # MONITOREO: PROMETHEUS (Recolector de métricas)\n  # ==========================================================\n  prometheus:\n    image: prom/prometheus:latest\n    container_name: prometheus-freeradius\n    \n    networks:\n      freeradius-network:\n        ipv4_address: 172.28.1.20\n    \n    volumes:\n      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro\n      - prometheus-data:/prometheus\n    \n    ports:\n      - \"9090:9090\"\n    \n    command:\n      - '--config.file=/etc/prometheus/prometheus.yml'\n      - '--storage.tsdb.path=/prometheus'\n      - '--storage.tsdb.retention.time=30d'\n    \n    environment:\n      - TZ=UTC\n    \n    restart: always\n    \n    healthcheck:\n      test: [\"CMD\", \"wget\", \"--spider\", \"-q\", \"http://localhost:9090\"]\n      interval: 30s\n      timeout: 10s\n      retries: 3\n\n  # ==========================================================\n  # MONITOREO: GRAFANA (Visualización de métricas)\n  # ==========================================================\n  grafana:\n    image: grafana/grafana:latest\n    container_name: grafana-freeradius\n    \n    networks:\n      freeradius-network:\n        ipv4_address: 172.28.1.21\n    \n    volumes:\n      - grafana-data:/var/lib/grafana\n      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro\n    \n    ports:\n      - \"3000:3000\"\n    \n    environment:\n      - GF_SECURITY_ADMIN_USER=admin\n      - GF_SECURITY_ADMIN_PASSWORD=P9mL2kR7jF4bN1w5tH3x  # ⚠️ CAMBIAR\n      - GF_INSTALL_PLUGINS=grafana-piechart-panel\n      - TZ=UTC\n    \n    restart: always\n    \n    depends_on:\n      - prometheus\n    \n    healthcheck:\n      test: [\"CMD\", \"wget\", \"--spider\", \"-q\", \"http://localhost:3000\"]\n      interval: 30s\n      timeout: 10s\n      retries: 3\n\n  # ==========================================================\n  # ALERTAS: ALERTMANAGER (Gestión de alertas)\n  # ==========================================================\n  alertmanager:\n    image: prom/alertmanager:latest\n    container_name: alertmanager-freeradius\n    \n    networks:\n      freeradius-network:\n        ipv4_address: 172.28.1.22\n    \n    volumes:\n      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro\n      - alertmanager-data:/alertmanager\n    \n    ports:\n      - \"9093:9093\"\n    \n    command:\n      - '--config.file=/etc/alertmanager/alertmanager.yml'\n      - '--storage.path=/alertmanager'\n    \n    restart: always\n    \n    environment:\n      - TZ=UTC\n\n  # ==========================================================\n  # BACKUP: SCRIPT DE BACKUP AUTOMÁTICO\n  # ==========================================================\n  backup:\n    build:\n      context: ./backup\n      dockerfile: Dockerfile.backup\n    container_name: freeradius-backup\n    \n    networks:\n      freeradius-network:\n    \n    volumes:\n      - ./radius:/etc/freeradius/3.0:ro\n      - ./certs:/etc/freeradius/3.0/certs:ro\n      - ./backups:/var/backups/freeradius\n      - /var/run/docker.sock:/var/run/docker.sock\n    \n    environment:\n      - BACKUP_SCHEDULE=0 2 * * *  # Daily at 2 AM\n      - BACKUP_RETENTION_DAYS=30\n      - BACKUP_COMPRESSION=gzip\n      - FREERADIUS_SECRET=W4nP7kL2xM9qR5tV3b8jF0nZ2hC6mR1p  # ⚠️ CAMBIAR\n    \n    restart: always\n    \n    depends_on:\n      - freeradius-primary\n      - freeradius-secondary\n\n  # ==========================================================\n  # LOGS CENTRALIZADOS: PROMTAIL + LOKI\n  # ==========================================================\n  # Descomentar si se desea centralizar logs\n  \n  # loki:\n  #   image: grafana/loki:latest\n  #   container_name: loki-freeradius\n  #   networks:\n  #     freeradius-network:\n  #       ipv4_address: 172.28.1.30\n  #   ports:\n  #     - \"3100:3100\"\n  #   restart: always\n  #\n  # promtail:\n  #   image: grafana/promtail:latest\n  #   container_name: promtail-freeradius\n  #   networks:\n  #     freeradius-network:\n  #   volumes:\n  #     - ./logs:/var/log/freeradius:ro\n  #     - ./monitoring/promtail.yml:/etc/promtail/config.yml:ro\n  #   restart: always\n\n# =============================================================\n# VOLÚMENES PERSISTENTES\n# =============================================================\nvolumes:\n  prometheus-data:\n    driver: local\n  grafana-data:\n    driver: local\n  alertmanager-data:\n    driver: local\n\n# =============================================================\n# REDES\n# =============================================================\networks:\n  freeradius-network:\n    driver: bridge\n    ipam:\n      config:\n        - subnet: 172.28.0.0/16\n        - gateway: 172.28.0.1\n"