version: '3.8'
# =============================================================
# FASE 4: PRODUCCIÓN - ALTA DISPONIBILIDAD
# =============================================================
# Docker Compose para FreeRADIUS con redundancia y monitoreo
# ⚠️ IMPORTANTE: Cambiar credenciales y IPs a valores reales
# =============================================================

services:
  # ==========================================================
  # FREERADIUS PRIMARIO
  # ==========================================================
  freeradius-primary:
    build: .
    container_name: freeradius-primary
    
    # Red y hostname
    networks:
      freeradius-network:
        ipv4_address: 172.28.1.10
        aliases:
          - radius-1.local
    
    # Volúmenes
    volumes:
      - ./radius:/etc/freeradius/3.0:ro
      - ./logs/primary:/var/log/freeradius
      - ./certs:/etc/freeradius/3.0/certs:ro
      - ./backups:/var/backups/freeradius
    
    # Puertos (primario)
    ports:
      - "1812:1812/udp"  # RADIUS Auth
      - "1813:1813/udp"  # RADIUS Accounting
    
    # Variables de entorno
    environment:
      - FREERADIUS_LOG_LEVEL=info
      - FREERADIUS_INSTANCE=primary
      - FREERADIUS_SECRET=W4nP7kL2xM9qR5tV3b8jF0nZ2hC6mR1p  # ⚠️ CAMBIAR
    
    # Reinicio automático
    restart: always
    
    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"
        labels: "service=freeradius,instance=primary"
    
    # Healthcheck
    healthcheck:
      test: ["CMD", "sh", "-c", "netstat -uln | grep 1812"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    
    # Limites de recursos
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    
    # Security
    security_opt:
      - no-new-privileges:true
    read_only_root_filesystem: false

  # ==========================================================
  # FREERADIUS SECUNDARIO (para HA)
  # ==========================================================
  freeradius-secondary:
    build: .
    container_name: freeradius-secondary
    
    # Red
    networks:
      freeradius-network:
        ipv4_address: 172.28.1.11
        aliases:
          - radius-2.local
    
    # Volúmenes (mismos que primario)
    volumes:
      - ./radius:/etc/freeradius/3.0:ro
      - ./logs/secondary:/var/log/freeradius
      - ./certs:/etc/freeradius/3.0/certs:ro
      - ./backups:/var/backups/freeradius
    
    # Puertos (diferentes al primario)
    ports:
      - "1814:1812/udp"  # RADIUS Auth (mapeo diferente)
      - "1815:1813/udp"  # RADIUS Accounting
    
    # Variables de entorno
    environment:
      - FREERADIUS_LOG_LEVEL=info
      - FREERADIUS_INSTANCE=secondary
      - FREERADIUS_SECRET=W4nP7kL2xM9qR5tV3b8jF0nZ2hC6mR1p  # ⚠️ CAMBIAR
    
    restart: always
    
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"
        labels: "service=freeradius,instance=secondary"
    
    healthcheck:
      test: ["CMD", "sh", "-c", "netstat -uln | grep 1812"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    
    security_opt:
      - no-new-privileges:true

  # ==========================================================
  # MONITOREO: PROMETHEUS (Recolector de métricas)
  # ==========================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus-freeradius
    
    networks:
      freeradius-network:
        ipv4_address: 172.28.1.20
    
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    
    ports:
      - "9090:9090"
    
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    
    environment:
      - TZ=UTC
    
    restart: always
    
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==========================================================
  # MONITOREO: GRAFANA (Visualización de métricas)
  # ==========================================================
  grafana:
    image: grafana/grafana:latest
    container_name: grafana-freeradius
    
    networks:
      freeradius-network:
        ipv4_address: 172.28.1.21
    
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    
    ports:
      - "3000:3000"
    
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=P9mL2kR7jF4bN1w5tH3x  # ⚠️ CAMBIAR
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
      - TZ=UTC
    
    restart: always
    
    depends_on:
      - prometheus
    
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==========================================================
  # ALERTAS: ALERTMANAGER (Gestión de alertas)
  # ==========================================================
  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager-freeradius
    
    networks:
      freeradius-network:
        ipv4_address: 172.28.1.22
    
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    
    ports:
      - "9093:9093"
    
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    
    restart: always
    
    environment:
      - TZ=UTC

  # ==========================================================
  # BACKUP: SCRIPT DE BACKUP AUTOMÁTICO
  # ==========================================================
  backup:
    build:
      context: ./backup
      dockerfile: Dockerfile.backup
    container_name: freeradius-backup
    
    networks:
      freeradius-network:
    
    volumes:
      - ./radius:/etc/freeradius/3.0:ro
      - ./certs:/etc/freeradius/3.0/certs:ro
      - ./backups:/var/backups/freeradius
      - /var/run/docker.sock:/var/run/docker.sock
    
    environment:
      - BACKUP_SCHEDULE=0 2 * * *  # Daily at 2 AM
      - BACKUP_RETENTION_DAYS=30
      - BACKUP_COMPRESSION=gzip
      - FREERADIUS_SECRET=W4nP7kL2xM9qR5tV3b8jF0nZ2hC6mR1p  # ⚠️ CAMBIAR
    
    restart: always
    
    depends_on:
      - freeradius-primary
      - freeradius-secondary

  # ==========================================================
  # LOGS CENTRALIZADOS: PROMTAIL + LOKI
  # ==========================================================
  # Descomentar si se desea centralizar logs
  
  # loki:
  #   image: grafana/loki:latest
  #   container_name: loki-freeradius
  #   networks:
  #     freeradius-network:
  #       ipv4_address: 172.28.1.30
  #   ports:
  #     - "3100:3100"
  #   restart: always
  #
  # promtail:
  #   image: grafana/promtail:latest
  #   container_name: promtail-freeradius
  #   networks:
  #     freeradius-network:
  #   volumes:
  #     - ./logs:/var/log/freeradius:ro
  #     - ./monitoring/promtail.yml:/etc/promtail/config.yml:ro
  #   restart: always

# =============================================================
# VOLÚMENES PERSISTENTES
# =============================================================
volumes:
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  alertmanager-data:
    driver: local

# =============================================================
# REDES
# =============================================================
networks:
  freeradius-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
        - gateway: 172.28.0.1
